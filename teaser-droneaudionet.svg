<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-label="DroneAudioNet teaser placeholder">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#64748b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1600" height="520" fill="#ffffff"/>

  <!-- subtle wave -->
  <path
    d="M120 305
       C 220 255, 320 355, 420 305
       S 620 255, 720 305
       S 920 355, 1020 305
       S 1220 255, 1320 305
       S 1420 355, 1520 305"
    fill="none"
    stroke="url(#waveGrad)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.55"
  />

  <!-- minimal drone silhouette -->
  <g transform="translate(800 160)" opacity="0.18">
    <g transform="translate(-60 -22)">
      <rect x="35" y="12" width="50" height="18" rx="9" fill="#0f172a"/>
      <rect x="58" y="6" width="4" height="30" rx="2" fill="#0f172a"/>
      <path d="M20 20h24" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
      <path d="M86 20h24" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
      <circle cx="12" cy="20" r="10" fill="none" stroke="#0f172a" stroke-width="4"/>
      <circle cx="118" cy="20" r="10" fill="none" stroke="#0f172a" stroke-width="4"/>
    </g>
  </g>

  <!-- title -->
  <g filter="url(#softShadow)">
    <text
      x="800"
      y="250"
      text-anchor="middle"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
      font-size="96"
      font-weight="800"
      letter-spacing="2.5"
      fill="url(#titleGrad)"
    >DroneAudioNet</text>
  </g>

  <!-- thin underline -->
  <rect x="520" y="282" width="560" height="3" rx="1.5" fill="#0f172a" opacity="0.10"/>
</svg>

